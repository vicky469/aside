name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag $tag does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Refuse an existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; refusing to overwrite immutable assets."
            exit 1
          fi

      - name: Run release checks
        run: npm run release:check

      - name: Require manual release notes
        run: node scripts/check-release-notes.mjs "$GITHUB_REF_NAME"

      - name: Generate artifact attestations
        uses: actions/attest@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for asset in main.js styles.css; do
            gh attestation verify "$asset" \
              --repo vicky469/aside \
              --source-ref "refs/tags/$GITHUB_REF_NAME" \
              --source-digest "$GITHUB_SHA" \
              --signer-workflow vicky469/aside/.github/workflows/release.yml
          done

      - name: Load manual release notes
        id: release_notes
        shell: bash
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          {
            echo "notes<<EOF"
            cat "$notes_file"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --latest \
            --notes "$RELEASE_NOTES" \
            main.js manifest.json styles.css
