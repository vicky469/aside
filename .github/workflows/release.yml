name: Release Obsidian plugin

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME}"
          manifest_version="$(node -p "require('./manifest.json').version")"
          if [ "$tag" != "$manifest_version" ]; then
            echo "Tag $tag does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Run release checks
        run: npm run release:check

      - name: Require manual release notes
        run: node scripts/check-release-notes.mjs "$GITHUB_REF_NAME"

      - name: Load manual release notes
        id: release_notes
        shell: bash
        run: |
          notes_file="docs/releases/${GITHUB_REF_NAME}.md"
          {
            echo "notes<<EOF"
            cat "$notes_file"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ steps.release_notes.outputs.notes }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists; updating metadata and assets."
            gh release edit "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --latest \
              --verify-tag
            gh release upload "$GITHUB_REF_NAME" \
              --clobber \
              main.js manifest.json styles.css
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --verify-tag \
              --latest \
              --generate-notes \
              --notes "$RELEASE_NOTES" \
              main.js manifest.json styles.css
          fi
