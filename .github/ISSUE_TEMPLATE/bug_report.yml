name: Bug report
description: Report a reproducible bug in Aside.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      placeholder: |
        Problem summary:

        Steps to reproduce:
        1.
        2.
        3.

        Expected behavior:

        Actual behavior:

        Paste screenshots here if they help.
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Aside Version
      placeholder: 2.0.12
    validations:
      required: true
  - type: input
    id: obsidian_version
    attributes:
      label: Obsidian Version
      placeholder: 1.12.7
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS / Windows / Linux / iOS / iPadOS / Android
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: MacBook Pro / iPhone 15 / iPad Air / Pixel 8
    validations:
      required: true
  - type: textarea
    id: potential_root_causes
    attributes:
      label: Potential Root Cause(s)
      placeholder: If you have a technical guess, add it here.
    validations:
      required: false
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      placeholder: If you already know the likely fix, add it here.
    validations:
      required: false
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues first.
          required: true
