name: Bug report
description: Report a reproducible bug in SideNote2.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: problem_summary
    attributes:
      label: Problem Summary
      description: Describe the bug in one or two paragraphs. You can also paste screenshots here.
      placeholder: Describe the bug in one or two paragraphs. Paste screenshots here if they help.
    validations:
      required: true
  - type: markdown
    attributes:
      value: "### Detail"
  - type: input
    id: plugin_version
    attributes:
      label: SideNote2 Version
      placeholder: 2.0.12
    validations:
      required: true
  - type: input
    id: obsidian_version
    attributes:
      label: Obsidian Version
      placeholder: 1.12.7
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: macOS / Windows / Linux
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: I expected...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues first.
          required: true
